name: Release macOS DMGs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: macos-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "12.0"

jobs:
  build:
    name: Build ${{ matrix.asset_arch }} DMG
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
            asset_arch: arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset_arch: x64
    runs-on: ${{ matrix.runner }}
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target

    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set release version from tag
        run: node scripts/release/set-tauri-version.mjs "$GITHUB_REF_NAME"

      - name: Set up Rust target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Build ad-hoc signed DMG
        run: npm run tauri -- build --target "${{ matrix.target }}" --bundles dmg
        working-directory: apps/desktop

      - name: Verify and name release asset
        run: >-
          scripts/macos/collect-release-asset.sh
          "${{ matrix.target }}"
          "$GITHUB_REF_NAME"
          "$CARGO_TARGET_DIR/${{ matrix.target }}/release/bundle"
          release-assets

      - name: Upload DMG for release job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-dmg-${{ matrix.asset_arch }}
          path: release-assets/*.dmg
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out release metadata
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download both DMGs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: macos-dmg-*
          path: release-assets
          merge-multiple: true

      - name: Generate and verify SHA-256 checksums
        run: |
          expected=(
            "Lumen-ASR-${GITHUB_REF_NAME}-arm64.dmg"
            "Lumen-ASR-${GITHUB_REF_NAME}-x64.dmg"
          )
          for asset in "${expected[@]}"; do
            test -f "release-assets/$asset"
          done
          cd release-assets
          sha256sum "${expected[@]}" > SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          expected_assets=(
            "Lumen-ASR-${GITHUB_REF_NAME}-arm64.dmg"
            "Lumen-ASR-${GITHUB_REF_NAME}-x64.dmg"
            "SHA256SUMS.txt"
          )

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            is_draft="$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq '.isDraft')"
            if [[ "$is_draft" != "true" ]]; then
              existing_assets="$(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name')"
              for asset in "${expected_assets[@]}"; do
                if ! grep -Fxq "$asset" <<<"$existing_assets"; then
                  echo "Published release $GITHUB_REF_NAME is missing $asset" >&2
                  exit 1
                fi
              done
              echo "Release $GITHUB_REF_NAME already contains all expected assets."
              exit 0
            fi
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --draft \
              --title "Lumen ASR $GITHUB_REF_NAME" \
              --generate-notes \
              --notes "$(cat docs/release/macos/RELEASE_NOTES.md)"
          fi

          # A rebuilt DMG is not byte-for-byte reproducible. Replace the complete draft
          # asset set together so SHA256SUMS.txt always describes this workflow run.
          gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber

          uploaded_assets="$(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name')"
          for asset in "${expected_assets[@]}"; do
            if ! grep -Fxq "$asset" <<<"$uploaded_assets"; then
              echo "Draft release $GITHUB_REF_NAME is missing $asset" >&2
              exit 1
            fi
          done

          gh release edit "$GITHUB_REF_NAME" --draft=false
