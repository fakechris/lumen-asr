name: Public repository boundary

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  boundary:
    name: Reject internal or generated artifacts
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Check public repository boundary
        run: scripts/ci/check-public-repo-boundary.sh

      - name: Check pull request ancestry and size
        if: github.event_name == 'pull_request'
        run: >-
          scripts/ci/check-pr-scope.sh
          "${{ github.event.pull_request.base.sha }}"
          "${{ github.event.pull_request.head.sha }}"
